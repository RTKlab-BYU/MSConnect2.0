services:
  web:
    image: ${MSCONNECT_IMAGE:-msconnect:local}
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn msconnect.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    env_file:
      - path: .env
        required: false
    volumes:
      - ${MSCONNECT_DATA_HOST_PATH:-./data}:/app/data
      - ${MSCONNECT_MEDIA_HOST_PATH:-./media}:/app/media
      - ${MSCONNECT_STATIC_HOST_PATH:-./staticfiles}:/app/staticfiles
      - ${RAW_STORAGE_HOST_PATH:-./raw-storage}:/data/raw
      - ${RESULTS_HOST_PATH:-./results}:/data/results
    ports:
      - "${MSCONNECT_WEB_PORT:-8000}:8000"
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/accounts/login/', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  watcher:
    image: ${MSCONNECT_IMAGE:-msconnect:local}
    build: .
    command: >
      sh -c "python manage.py run_watcher_agent --match-run-by-name"
    env_file:
      - path: .env
        required: false
    environment:
      MSCONNECT_AGENT_TOKEN: ${MSCONNECT_WATCHER_TOKEN:-watcher-token}
      MSCONNECT_AGENT_NAME: ${WATCHER_AGENT_NAME:-watcher-1}
    volumes:
      - ${MSCONNECT_DATA_HOST_PATH:-./data}:/app/data
      - ${INCOMING_RAW_HOST_PATH:-./incoming}:/data/incoming:ro
      - ${RAW_STORAGE_HOST_PATH:-./raw-storage}:/data/raw
      - ${RESULTS_HOST_PATH:-./results}:/data/results
    depends_on:
      web:
        condition: service_healthy

  processor:
    image: ${MSCONNECT_IMAGE:-msconnect:local}
    build: .
    command: >
      sh -c "python manage.py run_processor_agent"
    env_file:
      - path: .env
        required: false
    environment:
      MSCONNECT_AGENT_TOKEN: ${MSCONNECT_PROCESSOR_TOKEN:-processor-token}
      MSCONNECT_AGENT_NAME: ${PROCESSOR_AGENT_NAME:-processor-1}
    volumes:
      - ${MSCONNECT_DATA_HOST_PATH:-./data}:/app/data
      - ${RAW_STORAGE_HOST_PATH:-./raw-storage}:/data/raw
      - ${RESULTS_HOST_PATH:-./results}:/data/results
    depends_on:
      web:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${MSCONNECT_NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${MSCONNECT_STATIC_HOST_PATH:-./staticfiles}:/static:ro
      - ${MSCONNECT_MEDIA_HOST_PATH:-./media}:/media:ro
    depends_on:
      web:
        condition: service_healthy
