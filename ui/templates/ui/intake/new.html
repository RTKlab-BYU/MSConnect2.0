<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>New Intake Request</title>
  <link rel="stylesheet" href="/static/ui/ui.css">
</head>
<body>
  <main class="app-shell">
    <nav class="top-nav app-nav">
      <a class="brand-mark" href="/ui/projects">
        <span class="brand-glyph">MS</span>
        <span><strong>MSConnect</strong><small>LIMS / SDMS</small></span>
      </a>
      <a href="/ui/projects">Projects</a>
      <a class="active" href="/ui/intake">Intake</a>
      <a href="/ui/projects/pre-acq">Pre-acq</a>
    </nav>

    <section class="page-header">
      <div>
        <p class="eyebrow">Project intake</p>
        <h1>New Request</h1>
        <p class="lede">Capture the study objective, lab, PI, sample estimate, and acquisition target before project promotion.</p>
      </div>
    </section>

    <form method="post" class="card">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Submit Intake Request</button>
    </form>
  </main>
</body>
</html>
